<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vojenský monitoring</title>
    <style>
        /* Základní čistý font a vycentrování */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            max-width: 800px; 
            margin: 20px auto; 
            line-height: 1.5; 
            color: #2c3e50; 
            padding: 0 15px; 
        }

        /* Nadpis a roletka vedle sebe, bez ošklivé čáry */
        h1 { 
            color: #1a252f; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 1.8em;
            margin-bottom: 20px; 
            border-bottom: none; 
        }

        /* Minimalistická roletka s jemným stínem */
        select { 
            padding: 6px 12px; 
            font-size: 14px; 
            border-radius: 6px; 
            border: 1px solid #e2e8f0; 
            cursor: pointer; 
            background-color: #f8fafc; 
            font-family: inherit; 
            color: #475569;
            transition: all 0.2s ease;
        }
        select:hover { background-color: #f1f5f9; border-color: #cbd5e1; }
        select:focus { outline: none; border-color: #94a3b8; box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.2); }

        /* Hlavní kontejner svodky - žádné zbytečné okraje */
        .analyza { 
            background: #ffffff; 
            padding: 0; 
            margin-top: 10px; 
        }
        .loader { font-style: italic; color: #94a3b8; }

        /* Kompaktní texty přímo od Clauda */
        .analyza h2 { margin-top: 20px; margin-bottom: 8px; font-size: 1.3em; color: #1e293b; }
        .analyza h3 { margin-top: 15px; margin-bottom: 6px; font-size: 1.1em; color: #334155; }
        .analyza p { margin-top: 0; margin-bottom: 8px; font-size: 0.95em; }
        
        /* Elegantní a sražené seznamy (odrážky) */
        .analyza ul { margin-top: 0; margin-bottom: 12px; padding-left: 20px; }
        .analyza li { margin-bottom: 4px; font-size: 0.95em; }
        .analyza li::marker { color: #94a3b8; } 

        /* Patička úplně dole */
        .paticka { margin-top: 30px; font-size: 0.8em; color: #94a3b8; border-top: 1px solid #f1f5f9; padding-top: 10px; }
    </style>
</head>
<body>
    <h1>
        Vojenský monitoring
        <select id="vyber-svodky">
            <option value="">Načítám archiv...</option>
        </select>
    </h1>
    
    <div id="obsah" class="analyza">
        <p class="loader">Načítám nejnovější data...</p>
    </div>

    <div class="paticka">
        Vygenerováno automaticky pomocí Apify a Claude AI. Data se načítají z JSON archivu.
    </div>

    <script>
        // JS pro načtení dat
        fetch('databaze.json')
            .then(response => response.json())
            .then(data => {
                const select = document.getElementById('vyber-svodky');
                const obsah = document.getElementById('obsah');
                
                if (data.length === 0) {
                    obsah.innerHTML = '<p>Zatím tu nejsou žádné svodky.</p>';
                    select.innerHTML = '<option>Prázdná databáze</option>';
                    return;
                }

                // Naplnění roletky
                select.innerHTML = '';
                data.forEach((zaznam, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.textContent = zaznam.titulek;
                    select.appendChild(option);
                });

                // Zobrazení první (nejnovější) svodky
                obsah.innerHTML = data[0].obsah;

                // Přepínání svodek
                select.addEventListener('change', (e) => {
                    obsah.innerHTML = data[e.target.value].obsah;
                });
            })
            .catch(error => {
                console.error('Chyba:', error);
                document.getElementById('obsah').innerHTML = '<p style="color:red;">Nepodařilo se načíst data z databáze.</p>';
            });
    </script>
</body>
</html>
